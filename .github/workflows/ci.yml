name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # This "opts in" to Node 24 for the actions immediately as requested
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6 # Updated from v4
      - name: Setup Node.js
        uses: actions/setup-node@v6 # Updated from v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6 # Updated from v4
      - name: Setup Node.js
        uses: actions/setup-node@v6 # Updated from v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test