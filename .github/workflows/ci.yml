# EXPOSE 5173

# CMD [ "npm","run","dev"]

# Docker Commands

# docker pull <image-name>
# docker build -t <file-name> . => for building Docker Application
# docker run -it <file-name> => for running the Files
# docker ps => to see running Containers
# docker ps -a => we can see all containers
# docker stop <container-id>/<image-name> => for stopping
# docker start <container-id>/<image-name> => for starting
# docker images => to see all images
# docker run -it -p 5173:5173 <file-name>


The main configuration file for Nginx is nginx.conf. It's typically located in /etc/nginx/nginx.conf

-------------------------

worker_processes auto;

events {
worker_connections 1024;
}

http {
include mime.types;
default_type application/octet-stream;

sendfile on;
keepalive_timeout 65;

server {
listen 80;
server_name localhost;

location / {
root /usr/share/nginx/html;
index index.html index.htm;
}
}
}
-------------------------------


LOCATION BLOCK

location /images/ {
root /var/www/images;
}
----------------------------

UPSTREAM BLOCK

upstream backend {
server backend1.example.com;
server backend2.example.com;
}
-----------------------------------
REVERSE PROXY WITH NGINX

server {
listen 80;
server_name example.com;

location / {
proxy_pass http://backend_server;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
}
---------------------------------------

LOAD BALANCING WITH NGINX

upstream backend {
server backend1.example.com;
server backend2.example.com;
}

server {
listen 80;
server_name example.com;

location / {
proxy_pass http://backend;
}
}
------------------------------------
SECURING NGINX WITH SSL/TLS

server {
listen 443 ssl;
server_name example.com;

ssl_certificate /etc/nginx/ssl/example.com.crt;
ssl_certificate_key /etc/nginx/ssl/example.com.key;

location / {
root /var/www/html;
index index.html;
}
}

server {
listen 80;
server_name example.com;
return 301 https://$host$request_uri;
}
------------------------------------------------
caching

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m;

-----------------------------------------------

log and troubleshoot

log_format main '$remote_addr - $remote_user [$time_local] "$request" '
'$status $body_bytes_sent "$http_referer" '
'"$http_user_agent" "$http_x_forwarded_for"';

access_log /var/log/nginx/access.log main;
