name: 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0
      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4.2.0
      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '24'
      - run: npm ci
      - run: npm test

